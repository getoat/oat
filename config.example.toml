[azure]
resource_name = "your-azure-openai-resource"
api_key = "paste-your-azure-openai-api-key-here"

# Override only if your deployment needs a different Azure OpenAI API version.
api_version = "2025-01-01-preview"

[chutes]
# Optional. Required only when selecting a Chutes-hosted model.
api_key = "paste-your-chutes-api-key-here"

[openrouter]
# Optional. Required only when selecting an OpenRouter-hosted model.
api_key = "paste-your-openrouter-api-key-here"

[codex]
# Optional. `oat /login` populates these fields for Codex device auth directly
# inside config.toml.
#
# API-key mode example:
# auth_mode = "api_key"
# OPENAI_API_KEY = "paste-your-openai-api-key-here"
#
# Device-login mode fields are managed automatically:
# auth_mode = "chatgpt"
# access_token = "..."
# refresh_token = "..."
# id_token = "..."
# account_id = "..."
# last_refresh = "2026-03-27T00:00:00Z"

[model]
# Active model selection. The provider is inferred from the model registry.
# Codex-backed models use the `codex/<slug>` namespace, for example:
# model_name = "codex/gpt-5.4"
model_name = "gpt-5.4-mini"

# Model-specific reasoning setting.
# GPT-style models in this registry expose model-specific subsets of:
# none, minimal, low, medium, high, xhigh
# kimi-k2.5: on, off
# OpenRouter reasoning support is also model-specific
# Chutes models in this registry: default
reasoning = "medium"

[ui]
show_thinking = true
show_tool_output = false

# Number of submitted prompts/commands to keep for up/down recall.
command_history_limit = 20

[subagents]
# Maximum number of concurrent subagents the main agent can run.
max_concurrent = 4

[planning]
# Optional extra planning models used by `/plan`. The current main model is
# always included automatically and should not be listed here.
agents = []

# Example:
# [[planning.agents]]
# model_name = "gpt-5.4"
# reasoning = "high"
#
# [[planning.agents]]
# model_name = "kimi-k2.5"
# reasoning = "on"
#
# [[planning.agents]]
# model_name = "zai-org/GLM-5-TEE"
# reasoning = "default"
#
# [[planning.agents]]
# model_name = "minimax/minimax-m2.7"
# reasoning = "medium"
#
# [[planning.agents]]
# model_name = "openai/gpt-5.4-mini"
# reasoning = "medium"
#
# [[planning.agents]]
# model_name = "codex/gpt-5.3-codex"
# reasoning = "high"

[memory]
enabled = true
auto_inject = true
auto_inject_token_budget = 3000
max_auto_results = 12
max_candidate_search_results = 50

[memory.retrieval.search]
min_total_score = 2.2
min_semantic_score = 0.58
min_lexical_score = 1.6

[memory.retrieval.auto_inject]
min_total_score = 3.6
min_semantic_score = 0.72
min_lexical_score = 2.2

[memory.retrieval.candidate_linking]
min_total_score = 2.4
min_semantic_score = 0.6
min_lexical_score = 1.6

[memory.extraction]
enabled = true

# Dedicated model used for post-turn memory extraction and consolidation.
# If omitted in an existing config, oat falls back to the main [model] selection.
model_name = "gpt-5.4-mini"
reasoning = "medium"

# Controls how much completed-turn evidence is packed into the extraction prompt.
max_evidence_tokens = 12000

# Maximum number of existing memories retrieved as consolidation context.
max_related_memories = 24

# Upper bound on extracted memory candidates per completed turn.
max_candidates_per_turn = 10

# Confidence thresholds expressed as percentages.
min_candidate_confidence = 55
min_active_confidence = 85

# Run extraction asynchronously after a completed main-agent turn.
run_in_background = true

[safety]
# Optional dedicated model used to classify shell commands as low, medium, or
# high risk before they can run. If omitted in an existing config, oat will
# fall back to the main agent model and reasoning setting.
model_name = "gpt-5.4-mini"
reasoning = "medium"

[tools]
# Tool outputs are truncated after approximately this many tokens.
max_output_tokens = 10000

# Optional allowlist patterns, relative to the workspace root, for paths that
# should remain searchable even when they are hidden or otherwise excluded by
# the default search filters.
# Examples:
# search_include_patterns = [".research/**", ".scratch/**"]
search_include_patterns = []
